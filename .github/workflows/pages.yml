name: Deploy website to GitHub Pages

# Publishes ONLY docs/website/ as the Pages site root, so the specs /
# plans / roadmap that also live under docs/ stay out of the public
# site. Site URL: https://llethanh.github.io/img_player/

on:
  push:
    branches: [main]
    paths:
      - 'docs/website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
